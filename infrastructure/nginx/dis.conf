map $http_x_forwarded_proto $dis_forwarded_proto {
    default $scheme;
    http http;
    https https;
}

server {
    listen 80 default_server;
    server_name _;

    root /opt/dis/webapp/backend/public;

    client_max_body_size 512m;
    server_tokens off;
    absolute_redirect off;

    include /opt/dis/infrastructure/nginx/security-headers.conf;

    error_page 400 = @dis_bad_request;
    error_page 403 = @dis_forbidden;
    error_page 404 = @dis_not_found;
    error_page 413 = @dis_payload_too_large;
    error_page 414 = @dis_uri_too_long;
    error_page 500 502 504 = @dis_service_unavailable;

    location = /mobile/config {
        rewrite ^ /api/mobile/config last;
    }

    location ^~ /updates/android/ {
        rewrite ^/updates/android/(.*)$ /api/updates/android/$1 last;
    }

    location ^~ /apk/ {
        error_page 503 = @dis_service_unavailable;
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        alias /opt/dis/webapp/backend/storage/app/android-apks/;
        types { }
        default_type application/vnd.android.package-archive;
        include /opt/dis/infrastructure/nginx/security-headers.conf;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "private, max-age=3600";
        sendfile on;
        tcp_nopush on;
        try_files $uri @dis_not_found;
    }

    location = /api {
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        return 308 /api/;
    }

    location = /status {
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 404 "Not found.\n";
    }

    location ^~ /status/ {
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 404 "Not found.\n";
    }

    # This is the only privileged recovery API that remains reachable while
    # the deployment lock blocks the operational API surface. Laravel applies
    # its developer key, scope and rate-limit controls to this route.
    location = /api/developer/system/maintenance {
        include fastcgi_params;
        include /opt/dis/infrastructure/nginx/fastcgi-hide-security-headers.conf;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_param HTTP_ACCEPT "application/json";
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $dis_forwarded_proto;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 30;
    }

    # Backup jobs are serialized by the root broker and have explicit
    # operation timeouts. Keep the HTTP timeout slightly above the longest
    # broker timeout so clients do not retry a restore that is still running.
    location ^~ /api/admin/backups {
        error_page 503 = @dis_api_maintenance;
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        include fastcgi_params;
        include /opt/dis/infrastructure/nginx/fastcgi-hide-security-headers.conf;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_param HTTP_ACCEPT "application/json";
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $dis_forwarded_proto;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 1250;
    }

    location ^~ /api/ {
        error_page 503 = @dis_api_maintenance;
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        include fastcgi_params;
        include /opt/dis/infrastructure/nginx/fastcgi-hide-security-headers.conf;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_param HTTP_ACCEPT "application/json";
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $dis_forwarded_proto;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location = /health {
        include fastcgi_params;
        include /opt/dis/infrastructure/nginx/fastcgi-hide-security-headers.conf;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_param REQUEST_URI /api/health;
        fastcgi_param HTTP_ACCEPT "application/json";
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $dis_forwarded_proto;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 30;
    }

    location = /index.php {
        internal;
        include fastcgi_params;
        include /opt/dis/infrastructure/nginx/fastcgi-hide-security-headers.conf;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $dis_forwarded_proto;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location /ws/ {
        error_page 503 = @dis_service_unavailable;
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $dis_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8080;
    }

    location /app/ {
        error_page 503 = @dis_service_unavailable;
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $dis_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /__dis_maintenance.html {
        internal;
        root /opt/dis/maintenance;
        include /opt/dis/infrastructure/nginx/security-headers.conf;
        add_header Content-Security-Policy "default-src 'none'; script-src 'none'; style-src 'sha256-FEXUkgpC3PlmFkN2GgDFJMfTYEYQZzQC97pDyLAblN0=' 'sha256-2I5+J0GujPJSvg9ZbrNoDTD/XBnTyZqqWgKAz06SGAI='; img-src 'none'; font-src 'none'; connect-src 'none'; media-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" always;
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files /__dis_maintenance.html @dis_service_unavailable;
    }

    location / {
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        error_page 400 = @dis_bad_request;
        error_page 403 = @dis_forbidden;
        error_page 404 = @dis_not_found;
        error_page 413 = @dis_payload_too_large;
        error_page 414 = @dis_uri_too_long;
        error_page 500 502 504 = @dis_service_unavailable;
        error_page 503 /__dis_maintenance.html;

        if ($http_accept ~* "application/json") {
            rewrite ^/(.*)$ /api/$1 last;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $dis_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
        proxy_hide_header x-nextjs-cache;
        proxy_hide_header x-nextjs-prerender;
        proxy_hide_header x-nextjs-stale-time;
        proxy_hide_header X-Served-By;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Resource-Policy;
        proxy_pass http://127.0.0.1:3000;
    }

    location @dis_not_found {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 404 "Not found.\n";
    }

    location @dis_bad_request {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 400 "Bad request.\n";
    }

    location @dis_forbidden {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 403 "Forbidden.\n";
    }

    location @dis_payload_too_large {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 413 "Payload too large.\n";
    }

    location @dis_uri_too_long {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 414 "URI too long.\n";
    }

    location @dis_api_maintenance {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type application/json;
        return 503 '{"error":{"code":"maintenance","message":"Service unavailable during maintenance.","details":{}}}\n';
    }

    location @dis_service_unavailable {
        internal;
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 503 "Service unavailable.\n";
    }

    location ~ /\.(?!well-known(?:/|$)) {
        include /opt/dis/infrastructure/nginx/static-response-headers.conf;
        default_type text/plain;
        return 404 "Not found.\n";
    }
}
