server {
    listen 80 default_server;
    server_name _;

    root /opt/dis/webapp/backend/public;

    client_max_body_size 512m;
    server_tokens off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;

    location = /mobile/config {
        rewrite ^ /api/mobile/config last;
    }

    location ^~ /updates/android/ {
        rewrite ^/updates/android/(.*)$ /api/updates/android/$1 last;
    }

    location ^~ /apk/ {
        alias /opt/dis/webapp/backend/storage/app/android-apks/;
        types { }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment" always;
        add_header Cache-Control "private, max-age=3600" always;
        sendfile on;
        tcp_nopush on;
        try_files $uri =404;
    }

    location = /api {
        return 308 /api/;
    }

    location = /status {
        return 404;
    }

    location ^~ /status/ {
        return 404;
    }

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_param HTTP_ACCEPT "application/json";
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location /health {
        try_files $uri /index.php?$query_string;
    }

    location /index.php {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/dis/webapp/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /opt/dis/webapp/backend/public;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8080;
    }

    location /app/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /__dis_maintenance.html {
        internal;
        root /opt/dis/maintenance;
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files /__dis_maintenance.html =503;
    }

    location / {
        if (-f /opt/dis/maintenance/frontend.lock) {
            return 503;
        }

        error_page 503 /__dis_maintenance.html;

        if ($http_accept ~* "application/json") {
            rewrite ^/(.*)$ /api/$1 last;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://127.0.0.1:3000;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
