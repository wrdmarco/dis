include /opt/dis/infrastructure/nginx/security-headers.conf;
add_header Content-Security-Policy "default-src 'none'; script-src 'none'; style-src 'none'; img-src 'none'; font-src 'none'; connect-src 'none'; media-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';" always;
add_header Cache-Control "no-store, max-age=0, must-revalidate" always;
