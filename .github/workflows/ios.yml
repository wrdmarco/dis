name: iOS Build Upload

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    name: Archive and upload iPhone app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Validate secrets
        run: |
          test -n "${{ secrets.APPLE_TEAM_ID }}"
          test -n "${{ secrets.IOS_BUNDLE_ID }}"
          test -n "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}"
          test -n "${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}"
          test -n "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}"
          test -n "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}"
          test -n "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}"
          test -n "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          test -n "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}"

      - name: Import signing assets
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/dis-ios-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/dis-ios.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/dis-ios-signing.keychain-db"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Install App Store Connect key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$API_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_$API_KEY_ID.p8"

      - name: Archive
        run: |
          xcodebuild \
            -project DISiOS.xcodeproj \
            -scheme DISiOS \
            -configuration Release \
            -archivePath build/DISiOS.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ secrets.IOS_BUNDLE_ID }}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}" \
            archive

      - name: Export IPA
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.IOS_BUNDLE_ID }}</key>
              <string>${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/DISiOS.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export

      - name: Upload to App Store Connect
        run: |
          IPA_PATH=$(find build/export -name "*.ipa" -print -quit)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      - name: Store IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DISiOS.ipa
          path: mobile/ios/build/export/*.ipa
          if-no-files-found: error
